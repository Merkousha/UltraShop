{% extends "base.html" %}
{% block title %}ورود{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-white rounded-lg shadow p-8">
        <h2 class="text-2xl font-bold text-center mb-6">ورود به سیستم</h2>

        {% if form.errors %}
        <div class="bg-red-50 border border-red-200 rounded p-3 mb-4 text-sm text-red-700">نام‌کاربری یا رمز عبور اشتباه است.</div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1">ایمیل</label>
                <input type="email" name="username" required class="w-full border rounded px-3 py-2 text-sm" autofocus>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">رمز عبور</label>
                <input type="password" name="password" required class="w-full border rounded px-3 py-2 text-sm">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">ورود</button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            حساب کاربری ندارید؟
            <a href="{% url 'accounts:signup' %}" class="text-indigo-600 hover:underline">ثبت‌نام</a>
        </p>
    </div>
</div>
{% endblock %}
