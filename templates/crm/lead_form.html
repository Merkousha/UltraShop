{% extends "dashboard/base.html" %}
{% load static %}
{% block title %}{% if lead %}ویرایش سرنخ{% else %}سرنخ جدید{% endif %}{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">
        {% if lead %}✏️ ویرایش سرنخ «{{ lead.name }}»{% else %}➕ سرنخ جدید{% endif %}
    </h1>

    <form method="post" class="bg-white rounded-xl shadow p-6 space-y-4">
        {% csrf_token %}

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">نام *</label>
                <input type="text" name="name" required
                       value="{% if lead %}{{ lead.name }}{% endif %}"
                       class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       placeholder="نام سرنخ">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">شماره تماس</label>
                <input type="text" name="phone" dir="ltr"
                       value="{% if lead %}{{ lead.phone }}{% endif %}"
                       class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       placeholder="09xx">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ایمیل</label>
                <input type="email" name="email" dir="ltr"
                       value="{% if lead %}{{ lead.email }}{% endif %}"
                       class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">منبع</label>
                <input type="text" name="source"
                       value="{% if lead %}{{ lead.source }}{% else %}manual{% endif %}"
                       class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       placeholder="manual / chat / contact_form">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">مرحله</label>
            <select name="stage"
                    class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                {% for stage_val, stage_label in stage_choices %}
                <option value="{{ stage_val }}"
                    {% if lead and lead.stage == stage_val %}selected
                    {% elif not lead and stage_val == 'new' %}selected{% endif %}>
                    {{ stage_label }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">یادداشت</label>
            <textarea name="note" rows="3"
                      class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                      placeholder="اطلاعات تکمیلی...">{% if lead %}{{ lead.note }}{% endif %}</textarea>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 text-sm font-medium">
                ذخیره
            </button>
            <a href="{% url 'dashboard:crm:lead-kanban' %}"
               class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 text-sm">
                انصراف
            </a>
        </div>
    </form>
</div>
{% endblock %}
