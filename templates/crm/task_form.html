{% extends "dashboard/base.html" %}
{% load static %}
{% block title %}ایجاد وظیفه{% endblock %}
{% block content %}
<div class="max-w-xl">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">➕ وظیفه جدید</h1>

    <form method="post" class="bg-white rounded-xl shadow p-6 space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">عنوان وظیفه *</label>
            <input type="text" name="title" required
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
                   placeholder="مثال: پیگیری تلفنی با مشتری">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">تاریخ سررسید</label>
                <input type="date" name="due_date" dir="ltr"
                       class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">اولویت</label>
                <select name="priority"
                        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    {% for pval, plabel in priority_choices %}
                    <option value="{{ pval }}" {% if pval == 'medium' %}selected{% endif %}>{{ plabel }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">مرتبط با سرنخ</label>
            <select name="lead"
                    class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <option value="">— بدون سرنخ —</option>
                {% for lead in leads %}
                <option value="{{ lead.pk }}"
                    {% if selected_lead and selected_lead.pk == lead.pk %}selected{% endif %}>
                    {{ lead.name }} ({{ lead.get_stage_display }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 text-sm font-medium">
                ذخیره
            </button>
            <a href="{% if selected_lead %}{% url 'dashboard:crm:lead-detail' selected_lead.pk %}{% else %}{% url 'dashboard:crm:task-list' %}{% endif %}"
               class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 text-sm">
                انصراف
            </a>
        </div>
    </form>
</div>
{% endblock %}
