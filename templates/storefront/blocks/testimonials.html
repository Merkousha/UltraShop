<section class="mb-8">
    <h2 class="text-xl font-bold mb-4" style="color: var(--text-heading);">{{ block.settings.title|default:"نظرات مشتریان" }}</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        {% for item in block.settings.items %}
        <div class="bg-white rounded-lg shadow p-4 border-r-4" style="border-right-color: var(--color-primary-500);">
            <p class="text-gray-600 text-sm">{{ item.text|default:"" }}</p>
            <p class="text-xs text-gray-400 mt-2">{{ item.author|default:"" }}</p>
        </div>
        {% empty %}
        <p class="col-span-full text-center text-gray-400 py-4">هنوز نظری ثبت نشده.</p>
        {% endfor %}
    </div>
</section>
