<section class="bg-white rounded-xl shadow-md overflow-hidden mb-6" style="--block-radius: var(--radius-base, 0.5rem);">
    <div class="relative bg-gradient-to-l from-[var(--color-primary-100)] to-[var(--color-primary-50)] p-8 md:p-12 text-center">
        {% if block.settings.image %}
        <img src="{{ block.settings.image }}" alt="{{ block.settings.title }}" class="absolute inset-0 w-full h-full object-cover opacity-20">
        {% endif %}
        <div class="relative">
            <h1 class="text-2xl md:text-4xl font-bold mb-2" style="color: var(--text-heading, var(--color-primary-900));">{{ block.settings.title|default:"به فروشگاه ما خوش آمدید" }}</h1>
            {% if block.settings.subtitle %}<p class="text-gray-600 mb-4">{{ block.settings.subtitle }}</p>{% endif %}
            {% if block.settings.cta_text %}
            <a href="{{ block.settings.cta_url|default:'#' }}" class="btn-primary text-white px-6 py-2 rounded-lg inline-block">{{ block.settings.cta_text }}</a>
            {% endif %}
        </div>
    </div>
</section>
