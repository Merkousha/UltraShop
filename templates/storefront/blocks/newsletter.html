<section class="mb-8 bg-white rounded-lg shadow p-6 text-center">
    <h2 class="text-xl font-bold mb-2" style="color: var(--text-heading);">{{ block.settings.title|default:"در خبرنامه ما عضو شوید" }}</h2>
    <p class="text-gray-500 text-sm mb-4">با عضویت از تخفیف‌ها و اخبار باخبر شوید.</p>
    <form method="post" action="#" class="flex flex-col sm:flex-row gap-2 max-w-md mx-auto">
        <input type="email" placeholder="ایمیل شما" class="flex-1 border rounded-lg px-4 py-2 text-sm" required>
        <button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg text-sm">{{ block.settings.button_text|default:"عضویت" }}</button>
    </form>
</section>
