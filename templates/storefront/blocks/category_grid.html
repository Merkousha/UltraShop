<section class="mb-8">
    <h2 class="text-xl font-bold mb-4" style="color: var(--text-heading);">{{ block.settings.title|default:"دسته‌بندی‌ها" }}</h2>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
        {% for cat in block.categories %}
        <a href="{% url 'storefront:category-detail' store.username cat.slug %}" class="bg-white rounded-lg shadow overflow-hidden hover:shadow-md transition">
            {% if cat.image %}
            <img src="{{ cat.image.url }}" class="w-full h-28 object-cover" alt="{{ cat.name }}">
            {% else %}
            <div class="w-full h-28 bg-gray-100 flex items-center justify-center text-3xl text-gray-300">🗂️</div>
            {% endif %}
            <div class="p-4 text-center">
            <p class="font-medium">{{ cat.name }}</p>
            <p class="text-xs text-gray-400 mt-1">{{ cat.products.count }} محصول</p>
            </div>
        </a>
        {% empty %}
        <p class="col-span-full text-center text-gray-400 py-6">دسته‌بندی وجود ندارد.</p>
        {% endfor %}
    </div>
</section>
