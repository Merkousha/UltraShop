{% extends "base.html" %}
{% block title %}ورود به پنل ادمین{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-indigo-50">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">🛡️ ورود به پنل ادمین</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">ایمیل</label>
                <input type="email" name="username" required class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-1">رمز عبور</label>
                <input type="password" name="password" required class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            {% if form.errors %}
            <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">ایمیل یا رمز عبور اشتباه است.</div>
            {% endif %}
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 transition">ورود</button>
        </form>
    </div>
</div>
{% endblock %}
