{% extends "platform_admin/base.html" %}
{% block title %}{% if carrier %}Edit{% else %}Add{% endif %} Carrier{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold">{% if carrier %}Edit carrier{% else %}Add carrier{% endif %}</h1>
<form method="post" class="mt-6 max-w-md space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
</form>
<p class="mt-4"><a href="{% url 'platform_admin:carrier_list' %}" class="text-blue-600 hover:underline">Back to carriers</a></p>
{% endblock %}
