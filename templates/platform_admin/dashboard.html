{% extends "platform_admin/base.html" %}
{% block title %}Dashboard - Platform Admin{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold">Dashboard</h1>
<div class="mt-6 grid gap-4 sm:grid-cols-2">
    <a href="{% url 'platform_admin:store_list' %}" class="rounded-lg border bg-white p-4 shadow">
        <span class="text-2xl font-bold">{{ store_count }}</span>
        <span class="text-gray-600">Active stores</span>
    </a>
    <a href="{% url 'platform_admin:payout_list' %}?status=pending" class="rounded-lg border bg-white p-4 shadow">
        <span class="text-2xl font-bold">{{ pending_payouts }}</span>
        <span class="text-gray-600">Pending payouts</span>
    </a>
</div>
<p class="mt-6"><a href="{% url 'platform_admin:store_list' %}">Stores</a> | <a href="{% url 'platform_admin:payout_list' %}">Payouts</a> | <a href="{% url 'platform_admin:commission_report' %}">Commission</a> | <a href="{% url 'platform_admin:platform_settings' %}">Platform settings</a> | <a href="{% url 'platform_admin:carrier_list' %}">Carriers</a></p>
{% endblock %}
