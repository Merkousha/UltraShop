{% extends "base.html" %}
{% block title %}آدرس ارسال | {{ store.name }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
    <h1 class="text-2xl font-bold text-gray-900">آدرس ارسال</h1>
    <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700">نام و نام‌خانوادگی</label>
            <input type="text" name="full_name" value="{{ checkout_address.full_name }}" class="input" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">موبایل</label>
            <input type="text" name="phone" value="{{ checkout_address.phone }}" class="input" dir="ltr" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">ایمیل (برای ارسال رسید)</label>
            <input type="email" name="email" value="{{ checkout_address.email }}" class="input" dir="ltr">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">آدرس</label>
            <textarea name="address" class="input" rows="3" required>{{ checkout_address.address }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">شهر</label>
            <input type="text" name="city" value="{{ checkout_address.city }}" class="input" required>
        </div>
        <button type="submit" class="btn btn-primary w-full">ادامه</button>
    </form>
    <p class="mt-4"><a href="{% url 'catalog:cart_detail' %}" class="text-blue-600 hover:underline">بازگشت به سبد</a></p>
</div>
{% endblock %}
