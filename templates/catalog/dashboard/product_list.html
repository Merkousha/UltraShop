{% extends "base.html" %}
{% block title %}محصولات | داشبورد{% endblock %}
{% block content %}
<div class="mx-auto max-w-4xl">
    <h1 class="text-2xl font-bold text-gray-900">محصولات</h1>
    <p class="mt-2"><a href="{{ store_path_prefix }}{% url 'catalog:dashboard_product_create' %}" class="btn btn-primary">افزودن محصول</a></p>
    <table class="mt-4 w-full border">
        <thead><tr class="border-b bg-gray-50"><th class="p-2 text-right">نام</th><th class="p-2 text-right">وضعیت</th><th class="p-2"></th></tr></thead>
        <tbody>
            {% for product in products %}
                <tr class="border-b">
                    <td class="p-2">{{ product.name }}</td>
                    <td class="p-2">{{ product.get_status_display }}</td>
                    <td class="p-2"><a href="{{ store_path_prefix }}{% url 'catalog:dashboard_product_edit' pk=product.pk %}" class="text-blue-600 hover:underline">ویرایش</a></td>
                </tr>
            {% empty %}
                <tr><td colspan="3" class="p-4 text-gray-500">محصولی ثبت نشده است.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <p class="mt-4"><a href="{{ store_path_prefix }}{% url 'stores:dashboard' %}" class="text-blue-600 hover:underline">بازگشت به داشبورد</a></p>
</div>
{% endblock %}
