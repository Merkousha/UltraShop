{% load static %}<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ platform_settings.name|default:"UltraShop" }}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/vazirmatn.css' %}">
    <script src="{% static 'js/tailwind.js' %}"></script>
    <style>
        body { font-family: 'Vazirmatn', Tahoma, sans-serif; }
        [dir="rtl"] { direction: rtl; text-align: right; }
    </style>
    {% block theme_css %}{% endblock %}
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:right-2 focus:z-50 focus:bg-indigo-600 focus:text-white focus:px-4 focus:py-2 focus:rounded focus:outline-none focus:ring-2 focus:ring-white">رفتن به محتوای اصلی</a>
    {% block body %}
    <main id="main-content" role="main" tabindex="-1">
    {% block content %}{% endblock %}
    </main>
    {% endblock %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
