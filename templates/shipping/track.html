{% extends "base.html" %}
{% block title %}رهگیری ارسال | {{ store.name }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
    <h1 class="text-2xl font-bold text-gray-900">وضعیت ارسال</h1>
    <p class="mt-2 text-gray-600">کد رهگیری: <strong>{{ shipment.tracking_number }}</strong></p>
    <p class="mt-2">وضعیت: {{ shipment.get_status_display }}</p>
    <p class="mt-4 text-sm text-gray-500">ثبت شده در {{ shipment.created_at|date:"Y/m/d H:i" }}</p>
    <p class="mt-4"><a href="{% url 'core:home' %}" class="text-blue-600 hover:underline">بازگشت به فروشگاه</a></p>
</div>
{% endblock %}
