{% extends "base.html" %}
{% block title %}Branding | Settings{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900">Branding</h1>
    <p class="mt-1 text-gray-600">Logo, color and theme for your store.</p>
    {% if is_owner %}
    <form method="post" action="" enctype="multipart/form-data" class="mt-6 space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
    {% else %}
    <p class="mt-4 text-gray-500">Only the store owner can change branding.</p>
    {% endif %}
    <p class="mt-6"><a href="{{ store_path_prefix }}{% url 'stores:settings' %}" class="text-blue-600 hover:underline">Back to settings</a></p>
</div>
{% endblock %}
