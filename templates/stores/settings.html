{% extends "base.html" %}
{% block title %}تنظیمات | داشبورد{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900">تنظیمات</h1>
    <p class="mt-1 text-gray-600">فروشگاه: <strong>{{ store.name }}</strong></p>
    <div class="mt-6 grid gap-4 sm:grid-cols-2">
        <a href="{{ store_path_prefix }}{% url 'stores:domain_settings' %}" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm hover:border-blue-300">دامنه و آدرس فروشگاه</a>
        <a href="{{ store_path_prefix }}{% url 'stores:branding_settings' %}" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm hover:border-blue-300">ظاهر و برند</a>
        {% if is_owner %}
        <a href="{{ store_path_prefix }}{% url 'stores:staff_list' %}" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm hover:border-blue-300">کارکنان فروشگاه</a>
        {% endif %}
    </div>
    <p class="mt-6"><a href="{{ store_path_prefix }}{% url 'stores:dashboard' %}" class="text-blue-600 hover:underline">بازگشت به داشبورد</a></p>
</div>
{% endblock %}
